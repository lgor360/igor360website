<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мини-игра "Найди кнопку"</title>
<link rel="stylesheet" href="https://unpkg.com/7.css">
<style>
  .game-button {
    margin: 10px;
  }
</style>
</head>
<body>

<div class="button-container" id="buttonContainer"></div>

<script>
  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function createButton(isCorrect) {
    const button = document.createElement('button');
    button.innerText = 'Кнопка';
    button.classList.add('game-button');
    if (isCorrect) {
      button.onclick = function() { showModal(); };
    } else {
      button.onclick = function() { window.location.reload(); };
    }
    return button;
  }

function setupGame() {
  const buttons = [];
  for (let i = 0; i < 50; i++) {
    buttons.push(createButton(i === 0)); // Первая кнопка будет "верной"
  }
  shuffleArray(buttons);
  const container = document.getElementById('buttonContainer');
  buttons.forEach(button => container.appendChild(button));
}

function createButton(isCorrect) {
  const button = document.createElement('button');
  button.innerText = 'верная';
  button.classList.add('game-button');
  if (isCorrect) {
    button.onclick = function() { showModal(); };
  } else {
    button.onclick = function() { window.location.reload(); };
  }
  return button;
}

function showModal() {
    alert('вы выйграли!'); // Вывод сообщения об ошибке
    window.location.reload(); // Перезагрузка страницы
}

setupGame();
</script>

</body>
</html>
