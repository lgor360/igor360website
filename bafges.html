<body>
    <font>создай бейджик :3</font>
    <hr class="void">
    <input placeholder="текст слева" id="lt">
    <hr class="void">
    <input placeholder="текст справа" id="rt">
    <hr class="void">
    <input placeholder="цвет справа (hex или название цвета)" id="rc">
    <hr class="void">
    <button onclick="hi()">криэйт</button>
    <hr class="void">
    <font id="ot">оютпут</font>
    <hr class="void">
    <img src="https://img.shields.io/badge/text-here-red" alt="бэдгэ" id="view">
    <script>
        function hi() {
            let url = "https://img.shields.io/badge/";
            let view = document.getElementById("view");
            let lt = document.getElementById("lt").value;
            let rt = document.getElementById("rt").value;
            let rc = document.getElementById("rc").value;
            let ot = document.getElementById("ot");
            let out = url + encodeURIComponent(lt) + "-" + encodeURIComponent(rt) + "-" + encodeURIComponent(rc);
            view.src = out; // Update the image source
            if (lt === "" && rt === "" && rc === "") {
                out = "https://img.shields.io/badge/NOT_ALL_INPUTS-FILLED_UP-red";
                view.src = out;
            } else if (rt === "") {
                out = "https://img.shields.io/badge/NOT_ALL_INPUTS-FILLED_UP-red";
                view.src = out;
            } else if (lt === "") {
                out = "https://img.shields.io/badge/NOT_ALL_INPUTS-FILLED_UP-red";
                view.src = out;
            } else if (rc === "") {
                out = "https://img.shields.io/badge/NOT_ALL_INPUTS-FILLED_UP-red";
                view.src = out;
            }
            ot.innerText = out; // Changed from ot.value to ot.innerText
            console.log(out);
        }
    </script>
